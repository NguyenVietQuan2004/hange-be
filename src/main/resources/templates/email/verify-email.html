<!-- verify-email.html -->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Verify Email</title>
</head>
<body style="font-family: Arial; background:#f4f4f4; padding:20px;">

<div style="max-width:600px;margin:auto;background:#fff;padding:20px;border-radius:10px">

    <h2 style="color:#333;">Xác thực tài khoản</h2>

    <p>Chào <b th:text="${email}">user</b>,</p>

    <p>Bạn vừa đăng ký tài khoản. Vui lòng xác thực email bằng cách bấm vào nút bên dưới:</p>

    <div style="text-align:center;margin:30px 0;">
        <a th:href="${verifyUrl}"
           style="background:#4CAF50;color:white;padding:12px 20px;
                  text-decoration:none;border-radius:6px;">
            Xác thực email
        </a>
    </div>

    <p>Nếu bạn không yêu cầu, hãy bỏ qua email này.</p>

    <p>Link sẽ hết hạn sau <b>15 phút</b>.</p>

</div>

</body>
</html>
