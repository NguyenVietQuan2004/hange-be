name: Deploy Spring Boot Production

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ======================
  # BUILD JOB (CI)
  # ======================
  build:
    runs-on: ubuntu-latest

    environment: vps-hange-spring

    steps:
      # checkout source code
      - name: Checkout source
        uses: actions/checkout@v4

      # setup Java 21
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      # cấp quyền gradlew
      - name: Grant execute permission
        run: chmod +x gradlew

      # build Spring Boot bằng Gradle
      - name: Build with Gradle
        run: ./gradlew clean build -x test
  deploy:
    runs-on: ubuntu-latest

    environment: vps-hange

    needs: build

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0

        with:
          host: ${{ secrets.HOST_PRODUCTION }}
          username: ${{ secrets.USERNAME_PRODUCTION }}
          password: ${{ secrets.PASSWORD_PRODUCTION }}
          port: ${{ secrets.PORT_PRODUCTION }}

          script: |

            # vào folder backend trên VPS
            cd ~/.production/hange-be

            # update code
            git fetch --all
            git reset --hard origin/main
