name: Deploy Spring Boot Production

on:
  push:
    branches: ["main"]

jobs:
  # =========================
  # BUILD + PUSH DOCKER IMAGE
  # =========================
  build-and-push:
    runs-on: ubuntu-latest
    environment: vps-hange-spring

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # setup Java
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      # build jar
      - name: Build Spring Boot
        run: |
          chmod +x gradlew
          ./gradlew clean build -x test

      # login Docker Hub
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # build docker image
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/hange-backend:latest .

      # push image
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/hange-backend:latest

  # =========================
  # DEPLOY VPS
  # =========================
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: vps-hange-spring

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0

        with:
          host: ${{ secrets.HOST_PRODUCTION }}
          username: ${{ secrets.USERNAME_PRODUCTION }}
          password: ${{ secrets.PASSWORD_PRODUCTION }}
          port: ${{ secrets.PORT_PRODUCTION }}

          script: |

            cd ~/.pro-images

            # pull backend image mới
            docker pull ${{ secrets.DOCKER_USERNAME }}/hange-backend:latest

            # restart backend
            docker-compose up -d backend
